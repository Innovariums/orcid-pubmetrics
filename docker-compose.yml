services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      OPENALEX_MAILTO: ${OPENALEX_MAILTO:-jgasparlopez29@correo.unicordoba.edu.co}
      JOURNAL_METRICS_PROVIDER: sjr
      SJR_DATA_DIR: /data/sjr
      EDITORIAL_BOARDS_PROVIDER: open_editors
      OPEN_EDITORS_DATA_PATH: /data/open_editors/dataset.csv
      DATABASE_URL: sqlite:////data/app.db
      LOG_LEVEL: INFO
    volumes:
      - ./data:/data:ro
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: https://api-orcid-pubmetrics.innovarium.site
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
