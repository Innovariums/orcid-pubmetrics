services:
  backend:
    build:
      # Context = repo root para que el Dockerfile pueda COPIAR data/
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      OPENALEX_MAILTO: ${OPENALEX_MAILTO}
      JOURNAL_METRICS_PROVIDER: ${JOURNAL_METRICS_PROVIDER:-sjr}
      SJR_DATA_DIR: ${SJR_DATA_DIR:-/data/sjr}
      EDITORIAL_BOARDS_PROVIDER: ${EDITORIAL_BOARDS_PROVIDER:-open_editors}
      OPEN_EDITORS_DATA_PATH: ${OPEN_EDITORS_DATA_PATH:-/data/open_editors/openeditors_plus.parquet}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/app.db}
      JCR_API_KEY: ${JCR_API_KEY:-}
      JCR_API_BASE: ${JCR_API_BASE:-https://api.clarivate.com/apis/wos-journal/v1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173","https://orcid-pubmetrics.innovarium.site"]}
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
