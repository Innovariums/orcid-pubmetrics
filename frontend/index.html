<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- Primary SEO -->
    <title>orcid-pubmetrics — Análisis bibliométrico por ORCID, cuartil y comité editorial</title>
    <meta
      name="description"
      content="Herramienta web abierta para analizar la producción académica de un investigador a partir de su ORCID. Cruza publicaciones de OpenAlex con cuartiles SJR y muestra distribución por año, top revistas y evolución del score promedio. En español."
    />
    <meta
      name="keywords"
      content="ORCID, bibliometría, SJR, Scimago, cuartil, JCR, análisis de publicaciones, OpenAlex, indicadores académicos, investigación, Colombia, Universidad de Córdoba"
    />
    <meta name="author" content="Innovarium" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://orcid-pubmetrics.innovarium.site/" />

    <!-- Icons -->
