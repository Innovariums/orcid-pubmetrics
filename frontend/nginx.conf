map $http_user_agent $is_social_bot {
    default "";
    ~*(facebookexternalhit|facebot|twitterbot|linkedinbot|whatsapp|slackbot|discordbot|telegrambot|skypeuripreview|pinterestbot|bingbot|googlebot|applebot|embedly|redditbot|viberbot|tumblr|mastodon|flipboard|bluesky)  1;
}

# DNS de Docker Compose (service discovery). Requerido para resolver
# `backend` dinámicamente cuando proxy_pass tiene variables.
resolver 127.0.0.11 ipv6=off valid=30s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # Cache agresivo de assets versionados de Vite
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Ruta explícita al backend OG (útil para inspectores manuales).
    # $request_uri preserva el path completo + query string al proxy.
    location /og/ {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — bots sociales son proxy al backend con el OG dinámico.
    location / {
        set $backend_upstream "backend:8000";
        if ($is_social_bot) {
            proxy_pass http://$backend_upstream/og/preview$is_args$args;
            break;
        }
        try_files $uri $uri/ /index.html;
    }

    # Health / liveness
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
