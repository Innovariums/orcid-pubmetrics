map $http_user_agent $is_social_bot {
    default "";
    ~*(facebookexternalhit|facebot|twitterbot|linkedinbot|whatsapp|slackbot|discordbot|telegrambot|skypeuripreview|pinterestbot|bingbot|googlebot|applebot|embedly|redditbot|viberbot|tumblr|mastodon|flipboard|bluesky)  1;
}

# Resolver explícito de Docker (sirve como backup; el upstream lo usa
# por si la IP del backend cambia tras un redeploy).
resolver 127.0.0.11 ipv6=off valid=60s;

# Upstream estático: nginx resuelve `backend` al arrancar y se pinea a
# esa IP. Evita que el DNS devuelva varias IPs (rolling deploy) y que
# terminemos round-robin entre containers con código viejo y nuevo.
upstream backend_svc {
    server backend:8000 max_fails=2 fail_timeout=10s;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        if ($is_social_bot) {
            proxy_pass http://backend_svc/og/preview$is_args$args;
            break;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
